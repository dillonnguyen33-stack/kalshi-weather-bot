[project]
name = "weatherquant"
version = "0.1.0"
description = "Probabilistic forecasting system pricing Kalshi daily-high-temperature markets"
readme = "README.md"
requires-python = "==3.12.*"
dependencies = [
    # Persistence: psycopg v3 (NOT psycopg2), SQLAlchemy Core 2.0, Alembic migrations.
    # SQLAlchemy 2.0 speaks psycopg3 via the postgresql+psycopg:// dialect (D-09 / Pitfall 4).
    "psycopg[binary]==3.3.4",
    "sqlalchemy==2.0.50",
    "alembic==1.18.4",
    # Typed config + .env loading (V14 secrets handling). DATABASE_URL is read from env.
    "pydantic-settings==2.14.1",
    "python-dotenv==1.2.2",
]

[dependency-groups]
# Dev/test only. timezonefinder + zoneinfo live in tests/tooling ONLY — never on the
# runtime settlement path (D-02 / Pitfall 1). The no-runtime-DST guard test enforces this.
dev = [
    "pytest>=8.0",
    "timezonefinder==8.2.4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
# DB-requiring tests are marked `integration` so the fast (no-DB) subset can be selected
# with `-m "not integration"`. Registered here to avoid PytestUnknownMarkWarning.
markers = [
    "integration: tests that require a reachable Postgres via DATABASE_URL (postgresql+psycopg://)",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["weatherquant"]
